<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Study Tracker</title>
        <meta name="theme-color" content="#6366f1" />
        <link rel="manifest" href="manifest.json" />
        <link rel="icon" href="icons/icon-192.png" />
        <link rel="apple-touch-icon" href="icons/icon-192.png" />
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/dashboard.css" />
        <link rel="stylesheet" href="css/task.css" />
        <link rel="stylesheet" href="css/stats.css" />
        <link rel="stylesheet" href="css/animation.css" />
    </head>
    <body>
        <div class="container">
            <!-- 顶部英雄卡片 -->
            <header class="hero-card" id="heroCard">
                <div class="hero-greeting" id="heroGreeting">☀️ 下午好</div>
                <h2 class="hero-title" id="heroTitle">今天还没有任务</h2>
                <div class="hero-progress">
                    <div class="hero-progress-bar">
                        <div class="hero-progress-fill" id="heroProgressFill"></div>
                    </div>
                </div>
                <div class="hero-stats">
                    <div class="hero-stat">🔥 <span id="heroStreak">0</span>天</div>
                    <div class="hero-stat">📅 <span id="heroDaily">0</span>项</div>
                    <div class="hero-stat">🎯 <span id="heroLongterm">0</span>项</div>
                </div>
            </header>

            <!-- Tab 导航 -->
            <nav class="tabs">
                <button class="tab active" data-type="daily">每日任务</button>
                <button class="tab" data-type="longterm">长期任务</button>
                <button class="tab" data-type="stats">统计</button>
            </nav>

            <!-- 搜索栏 -->
            <div class="search-area">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索任务..." />
            </div>

            <!-- 输入区域 -->
            <div class="input-area" id="inputArea">
                <input type="text" id="taskInput" placeholder="添加新任务..." autofocus />
                <div class="input-options">
                    <select id="prioritySelect">
                        <option value="medium">🟡 中</option>
                        <option value="high">🔴 高</option>
                        <option value="low">🟢 低</option>
                    </select>
                    <input type="date" id="deadlineInput" class="deadline-input" title="截止日期" />
                    <button id="addBtn">＋ 添加</button>
                </div>
            </div>

            <!-- 每日任务列表 -->
            <div id="dailySection" class="task-section">
                <div id="dailyList" class="task-list"></div>
                <div id="dailyEmpty" class="empty-state">
                    <span class="empty-icon">✨</span>
                    <p>还没有每日任务</p>
                    <p class="empty-sub">添加你今天要做的事吧</p>
                </div>
            </div>

            <!-- 长期任务列表 -->
            <div id="longtermSection" class="task-section hidden">
                <div id="longtermList" class="task-list"></div>
                <div id="longtermEmpty" class="empty-state">
                    <span class="empty-icon">🎯</span>
                    <p>还没有长期任务</p>
                    <p class="empty-sub">设定一个目标，开始行动</p>
                </div>
            </div>

            <!-- 统计页面 -->
            <div id="statsSection" class="task-section hidden">
                <!-- 本周表现 -->
                <div class="stats-card week-summary-card">
                    <h3>📈 本周表现</h3>
                    <div class="week-summary-grid" id="weekSummary"></div>
                </div>
                <!-- 最近7天 -->
                <div class="stats-card">
                    <h3>📊 最近7天完成率</h3>
                    <div class="week-chart" id="weekChart"></div>
                </div>
                <!-- 热力图 -->
                <div class="stats-card">
                    <h3>🟩 学习热力图</h3>
                    <div class="heatmap-container" id="heatmap"></div>
                </div>
                <!-- 本月统计 -->
                <div class="stats-card">
                    <h3>📊 本月统计</h3>
                    <div class="month-stats" id="monthStats"></div>
                </div>
                <!-- 每日记录 -->
                <div class="stats-card">
                    <h3>🗓️ 每日完成率记录</h3>
                    <div class="history-list" id="historyList"></div>
                </div>
            </div>
        </div>

        <script type="module" src="src/app.js"></script>
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js');
            }
        </script>
    </body>
</html>
